<!DOCTYPE html>
<html lang="zh-CN" data-theme="classic">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lapseld.minesweeper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="game-header">
        <h1 class="game-title">lapseld.minesweeper</h1>
    </header>

    <div class="settings-wrapper">
        <button class="settings-toggle" id="settingsToggle" type="button" title="设置">⚙</button>
        <div class="settings-menu" id="settingsMenu">
            <!-- 公告 -->
            <div class="submenu" data-submenu="announce">
                <button class="submenu-header" type="button">📢 公告 <span class="submenu-arrow">▶</span></button>
                <div class="submenu-body">
                    <div class="announce-list" id="announceList"></div>
                </div>
            </div>
            <!-- 新手指引 -->
            <div class="submenu" data-submenu="guide">
                <button class="submenu-header" type="button">🎓 新手指引 <span class="submenu-arrow">▶</span></button>
                <div class="submenu-body">
                    <div class="guide-content">
                        <table class="guide-table">
                            <tr><td class="guide-key">左键</td><td>揭开格子</td></tr>
                            <tr><td class="guide-key">右键</td><td>插旗 / 取消旗标</td></tr>
                            <tr><td class="guide-key">中键</td><td>锁定数字格，3×3 区域高亮标记</td></tr>
                            <tr><td class="guide-key">左键·已揭数字</td><td>和弦展开（旗数 = 数字时自动揭开余格）</td></tr>
                            <tr><td class="guide-key">右键·已揭数字</td><td>一键智能插旗</td></tr>
                            <tr><td class="guide-key">左键拖动</td><td>拖动棋盘在界面中的位置</td></tr>
                            <tr><td class="guide-key">Ctrl + 滚轮</td><td>缩放棋盘</td></tr>
                        </table>
                        <hr class="guide-divider">
                        <p class="guide-tip">💡 悬停数字格可查看危险区域（按剩余雷数分 7 级高亮）</p>
                        <p class="guide-tip">💡 同时锁定多个数字格，悬停另一数字可显示交叉推演的安全区（白色）</p>
                        <p class="guide-tip">💡 开启"无死局模式"后棋盘将动态生成，保证每步均可纯逻辑推演</p>
                    </div>
                </div>
            </div>
            <!-- 难度 -->
            <div class="submenu" data-submenu="difficulty">
                <button class="submenu-header" type="button">🎯 难度 <span class="submenu-arrow">▶</span></button>
                <div class="submenu-body">
                    <button class="settings-option active" data-difficulty="easy" type="button">简单 · 9×9 · 10雷</button>
                    <button class="settings-option" data-difficulty="medium" type="button">中等 · 16×16 · 40雷</button>
                    <button class="settings-option" data-difficulty="hard" type="button">困难 · 30×16 · 99雷</button>
                    <button class="settings-option" data-difficulty="custom" type="button">自定义</button>
                    <div class="settings-custom" id="settingsCustom" style="display: none;">
                        <div class="custom-row">
                            <label>行</label><input type="number" id="customRows" min="5" max="30" value="9">
                            <label>列</label><input type="number" id="customCols" min="5" max="50" value="9">
                        </div>
                        <div class="custom-row">
                            <label>雷</label><input type="number" id="customMines" min="1" max="500" value="10">
                        </div>
                        <button class="settings-apply" id="customApply" type="button">应用</button>
                    </div>
                </div>
            </div>
            <!-- 游戏模式 -->
            <div class="submenu" data-submenu="gamemode">
                <button class="submenu-header" type="button">🧩 游戏模式 <span class="submenu-arrow">▶</span></button>
                <div class="submenu-body">
                    <label class="noguess-toggle">
                        <input type="checkbox" id="noGuessToggle">
                        <div class="noguess-body">
                            <span class="noguess-title">无死局模式</span>
                            <span class="noguess-desc">棋盘动态生成，规避终局必须盲猜的死局</span>
                        </div>
                    </label>
                </div>
            </div>
            <!-- 换肤 -->
            <div class="submenu" data-submenu="skin">
                <button class="submenu-header" type="button">🎨 换肤 <span class="submenu-arrow">▶</span></button>
                <div class="submenu-body">
                    <!-- 由 game.js 动态生成 -->
                </div>
            </div>
            <!-- 对局记录 -->
            <div class="submenu" data-submenu="records">
                <button class="submenu-header" type="button">📼 对局记录 <span class="submenu-arrow">▶</span></button>
                <div class="submenu-body">
                    <div class="records-list" id="recordsList"></div>
                </div>
            </div>
            <!-- 更新日志 -->
            <div class="submenu" data-submenu="changelog">
                <button class="submenu-header" type="button">📋 更新日志 <span class="submenu-arrow">▶</span></button>
                <div class="submenu-body">
                    <div class="changelog-list" id="changelogList"></div>
                </div>
            </div>
            <!-- 联系开发者 -->
            <div class="submenu" data-submenu="contact">
                <button class="submenu-header" type="button">📧 联系开发者 <span class="submenu-arrow">▶</span></button>
                <div class="submenu-body">
                    <textarea class="bug-input" id="bugInput" rows="3" placeholder="描述你遇到的问题或建议..."></textarea>
                    <button class="bug-submit" id="bugSubmit" type="button">发送反馈</button>
                    <span class="bug-hint" id="bugHint"></span>
                </div>
            </div>
        </div>
    </div>

    <main class="game-container">
        <div class="game-panel">
            <span class="panel-lcd" id="mineCounter">010</span>
            <button class="panel-face" id="btnNewGame" type="button" title="新游戏">🙂</button>
            <span class="panel-lcd" id="gameTimer">000</span>
        </div>
        <section class="game-board" id="gameBoard">
            <!-- 格子由 game.js 动态生成 -->
        </section>
        <div class="game-result" id="gameResult"></div>
        <div class="replay-panel" id="replayPanel">
            <button class="replay-btn" id="replayPrev" type="button" title="上一步">◀</button>
            <span class="replay-step" id="replayStep">0/0</span>
            <button class="replay-btn" id="replayNext" type="button" title="下一步">▶</button>
        </div>
    </main>

    <footer class="game-footer">
        <p class="footer-text"></p>
    </footer>

    <script src="Engine.js"></script>
    <script src="Renderer.js"></script>
    <script src="Controller.js"></script>
    <script src="main.js"></script>
</body>
</html>
